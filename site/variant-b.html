<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="meta.title">AI-Assisted Engineering — Training for Software Teams</title>
  <meta name="description" data-i18n-attr="content" data-i18n="meta.description" content="">
  <meta property="og:title" data-i18n-attr="content" data-i18n="meta.title" content="">
  <meta property="og:description" data-i18n-attr="content" data-i18n="meta.description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ai-coding.adusingi.com/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%237ee787'/></svg>">
  <link rel="stylesheet" href="assets/shared.css">
  <link rel="stylesheet" href="assets/variant-b.css">
  <script src="i18n/en.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
</head>
<body>
  <header class="v-b__header">
    <div class="v-b__header-inner">
      <a class="v-b__brand" href="/">
        <span class="v-b__brand-dot"></span><span data-i18n="nav.brand"></span>
      </a>
      <nav class="v-b__nav" aria-label="Primary">
        <a href="#work" data-i18n="nav.work"></a>
        <a href="#method" data-i18n="nav.method"></a>
        <a href="#pricing" data-i18n="nav.pricing"></a>
      </nav>
      <a class="v-b__cta-mini" href="#contact" data-i18n="nav.contact"></a>
    </div>
  </header>

  <main class="v-b">

    <section class="v-b__hero">
      <span class="v-b__eyebrow" data-i18n="hero.eyebrow"></span>
      <h1 class="v-b__title" data-i18n="hero.title_b"></h1>
      <p class="v-b__subtitle" data-i18n="hero.subtitle_b"></p>
      <div class="v-b__cta-row">
        <a class="v-b__cta" href="#contact" data-i18n="hero.cta_primary"></a>
        <a class="v-b__cta v-b__cta--ghost" href="#work" data-i18n="hero.cta_secondary"></a>
      </div>
      <p class="v-b__proof" data-i18n="hero.proof_line"></p>
    </section>

    <section class="v-b__section" id="method">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="method.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="method.title"></h2>
        <p class="v-b__section-subtitle" data-i18n="method.subtitle"></p>
      </header>
      <div class="v-b__steps">
        <article class="v-b__step">
          <div class="v-b__step-num">01 · <span data-i18n="method.step_1_label"></span></div>
          <h3 class="v-b__step-title" data-i18n="method.step_1_title"></h3>
          <p class="v-b__step-duration" data-i18n="method.step_1_duration"></p>
          <p class="v-b__step-body" data-i18n="method.step_1_body"></p>
        </article>
        <article class="v-b__step">
          <div class="v-b__step-num">02 · <span data-i18n="method.step_2_label"></span></div>
          <h3 class="v-b__step-title" data-i18n="method.step_2_title"></h3>
          <p class="v-b__step-duration" data-i18n="method.step_2_duration"></p>
          <p class="v-b__step-body" data-i18n="method.step_2_body"></p>
        </article>
        <article class="v-b__step">
          <div class="v-b__step-num">03 · <span data-i18n="method.step_3_label"></span></div>
          <h3 class="v-b__step-title" data-i18n="method.step_3_title"></h3>
          <p class="v-b__step-duration" data-i18n="method.step_3_duration"></p>
          <p class="v-b__step-body" data-i18n="method.step_3_body"></p>
        </article>
      </div>
    </section>

    <section class="v-b__section" id="deliverables">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="deliverables.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="deliverables.title"></h2>
        <p class="v-b__section-subtitle" data-i18n="deliverables.subtitle"></p>
      </header>
      <div class="v-b__deliv">
        <article class="v-b__deliv-card">
          <div class="v-b__deliv-icon">.md</div>
          <h3 class="v-b__deliv-title" data-i18n="deliverables.item_1_title"></h3>
          <p class="v-b__deliv-body" data-i18n="deliverables.item_1_body"></p>
        </article>
        <article class="v-b__deliv-card">
          <div class="v-b__deliv-icon">A</div>
          <h3 class="v-b__deliv-title" data-i18n="deliverables.item_2_title"></h3>
          <p class="v-b__deliv-body" data-i18n="deliverables.item_2_body"></p>
        </article>
        <article class="v-b__deliv-card">
          <div class="v-b__deliv-icon">›_</div>
          <h3 class="v-b__deliv-title" data-i18n="deliverables.item_3_title"></h3>
          <p class="v-b__deliv-body" data-i18n="deliverables.item_3_body"></p>
        </article>
        <article class="v-b__deliv-card">
          <div class="v-b__deliv-icon">30d</div>
          <h3 class="v-b__deliv-title" data-i18n="deliverables.item_4_title"></h3>
          <p class="v-b__deliv-body" data-i18n="deliverables.item_4_body"></p>
        </article>
      </div>
    </section>

    <section class="v-b__section" id="patterns">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="patterns.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="patterns.title"></h2>
        <p class="v-b__section-subtitle" data-i18n="patterns.subtitle"></p>
      </header>
      <div class="v-b__bento">
        <article class="v-b__cell v-b__cell--accent">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_1_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_1_body"></p>
        </article>
        <article class="v-b__cell">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_2_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_2_body"></p>
        </article>
        <article class="v-b__cell">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_3_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_3_body"></p>
        </article>
        <article class="v-b__cell v-b__cell--wide">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_4_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_4_body"></p>
        </article>
        <article class="v-b__cell v-b__cell--wide">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_5_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_5_body"></p>
        </article>
        <article class="v-b__cell">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_6_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_6_body"></p>
        </article>
        <article class="v-b__cell">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_7_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_7_body"></p>
        </article>
        <article class="v-b__cell">
          <h3 class="v-b__cell-title" data-i18n="patterns.p_8_title"></h3>
          <p class="v-b__cell-body"  data-i18n="patterns.p_8_body"></p>
        </article>
      </div>
    </section>

    <section class="v-b__section" id="work">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="projects.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="projects.title"></h2>
        <p class="v-b__section-subtitle" data-i18n="projects.subtitle"></p>
      </header>
      <div class="v-b__projects" id="projects-list"></div>
    </section>

    <section class="v-b__section" id="fit">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="who.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="who.title"></h2>
      </header>
      <div class="v-b__fit">
        <div class="v-b__fit-block">
          <h3 data-i18n="who.fit_title"></h3>
          <ul id="fit-list"></ul>
        </div>
        <div class="v-b__fit-block bad">
          <h3 data-i18n="who.notfit_title"></h3>
          <ul id="notfit-list"></ul>
        </div>
      </div>
    </section>

    <section class="v-b__section" id="pricing">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="pricing.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="pricing.title"></h2>
        <p class="v-b__section-subtitle" data-i18n="pricing.subtitle"></p>
      </header>
      <div class="v-b__tiers">
        <article class="v-b__tier">
          <h3 class="v-b__tier-name" data-i18n="pricing.tier_1_name"></h3>
          <p class="v-b__tier-for"   data-i18n="pricing.tier_1_for"></p>
          <p class="v-b__tier-price" data-i18n="pricing.tier_1_price"></p>
          <p class="v-b__tier-unit"  data-i18n="pricing.tier_1_unit"></p>
          <p class="v-b__tier-body"  data-i18n="pricing.tier_1_body"></p>
          <a class="v-b__tier-cta" href="#contact" data-i18n="pricing.tier_1_cta"></a>
        </article>
        <article class="v-b__tier v-b__tier--feat">
          <span class="v-b__tier-badge" data-i18n="pricing.tier_2_badge"></span>
          <h3 class="v-b__tier-name" data-i18n="pricing.tier_2_name"></h3>
          <p class="v-b__tier-for"   data-i18n="pricing.tier_2_for"></p>
          <p class="v-b__tier-price" data-i18n="pricing.tier_2_price"></p>
          <p class="v-b__tier-unit"  data-i18n="pricing.tier_2_unit"></p>
          <p class="v-b__tier-body"  data-i18n="pricing.tier_2_body"></p>
          <a class="v-b__tier-cta" href="#contact" data-i18n="pricing.tier_2_cta"></a>
        </article>
        <article class="v-b__tier">
          <h3 class="v-b__tier-name" data-i18n="pricing.tier_3_name"></h3>
          <p class="v-b__tier-for"   data-i18n="pricing.tier_3_for"></p>
          <p class="v-b__tier-price" data-i18n="pricing.tier_3_price"></p>
          <p class="v-b__tier-unit"  data-i18n="pricing.tier_3_unit"></p>
          <p class="v-b__tier-body"  data-i18n="pricing.tier_3_body"></p>
          <a class="v-b__tier-cta" href="#contact" data-i18n="pricing.tier_3_cta"></a>
        </article>
      </div>
    </section>

    <section class="v-b__section" id="faq">
      <header class="v-b__section-head">
        <span class="v-b__section-label" data-i18n="faq.section_label"></span>
        <h2 class="v-b__section-title" data-i18n="faq.title"></h2>
      </header>
      <div class="v-b__faq" id="faq-list"></div>
    </section>

    <section class="v-b__close" id="contact">
      <span class="v-b__section-label" data-i18n="cta.section_label"></span>
      <h2 data-i18n="cta.title"></h2>
      <p data-i18n="cta.subtitle"></p>
      <a class="v-b__cta" id="contact-cta" href="" data-i18n="cta.button"></a>
      <p style="margin-top:18px; font-size:13px; color:var(--muted);">
        <span data-i18n="cta.email_label"></span>: <a id="contact-email" href=""></a>
      </p>
    </section>

    <footer class="v-b__footer">
      <span><span data-i18n="footer.author"></span> · <span data-i18n="footer.location"></span></span>
      <a id="footer-site" href=""></a>
      <span data-i18n="footer.rights"></span>
    </footer>

  </main>

  <script src="js/switcher.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const projects = window.tList("projects.list");
      document.getElementById("projects-list").innerHTML = projects.map((p) => `
        <article class="v-b__proj">
          <p class="v-b__proj-name">${p.name}</p>
          <h3 class="v-b__proj-tag">${p.tagline}</h3>
          <p class="v-b__proj-body">${p.body}</p>
          <div class="v-b__proj-meta">
            <span><strong>Stack:</strong> ${p.stack}</span>
            <span><strong>AI:</strong> ${p.ai_role}</span>
          </div>
        </article>
      `).join("");

      document.getElementById("fit-list").innerHTML =
        window.tList("who.fit_items").map((i) => `<li>${i}</li>`).join("");
      document.getElementById("notfit-list").innerHTML =
        window.tList("who.notfit_items").map((i) => `<li>${i}</li>`).join("");

      document.getElementById("faq-list").innerHTML =
        window.tList("faq.items").map(({ q, a }) => `
          <details><summary>${q}</summary><p>${a}</p></details>
        `).join("");

      const email = window.t("cta.email");
      const ctaBtn = document.getElementById("contact-cta");
      ctaBtn.href = "mailto:" + email + "?subject=" + encodeURIComponent("AI-Assisted Engineering — intro call");
      const emailLink = document.getElementById("contact-email");
      emailLink.href = "mailto:" + email;
      emailLink.textContent = email;

      const site = document.getElementById("footer-site");
      site.href = window.t("footer.site_url");
      site.textContent = window.t("footer.site_label");
    });
  </script>
</body>
</html>
