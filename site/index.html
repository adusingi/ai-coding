<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="meta.title">AI-Assisted Engineering — Training for Software Teams</title>
  <meta name="description" data-i18n-attr="content" data-i18n="meta.description" content="">
  <meta property="og:title" data-i18n-attr="content" data-i18n="meta.title" content="">
  <meta property="og:description" data-i18n-attr="content" data-i18n="meta.description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ai-coding.adusingi.com/">
  <link rel="canonical" href="https://ai-coding.adusingi.com/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='62%' text-anchor='middle' font-size='80' font-family='Georgia,serif' fill='%236b3a1f'>A</text></svg>">
  <link rel="stylesheet" href="assets/shared.css">
  <link rel="stylesheet" href="assets/variant-a.css">
  <script src="i18n/en.js"></script>
  <script src="i18n/fr.js"></script>
  <script src="js/i18n.js"></script>
</head>
<body>
  <main class="v-a">

    <header class="v-a__topbar">
      <a href="/" class="v-a__brand">
        <span data-i18n="nav.brand">Aimable Dusingi</span><span class="v-a__brand-sub" data-i18n="nav.brand_sub">AI-Assisted Engineering</span>
      </a>
      <nav class="v-a__nav" aria-label="Primary">
        <a href="#work" data-i18n="nav.work">Work</a>
        <a href="#method" data-i18n="nav.method">Method</a>
        <a href="#pricing" data-i18n="nav.pricing">Pricing</a>
        <a href="#contact" data-i18n="nav.contact">Book a call</a>
      </nav>
    </header>

    <section class="v-a__hero">
      <p class="v-a__eyebrow" data-i18n="hero.eyebrow"></p>
      <h1 class="v-a__title" data-i18n="hero.title_a"></h1>
      <p class="v-a__subtitle v-a__opener" data-i18n="hero.subtitle_a"></p>
      <div class="v-a__cta-row">
        <a class="v-a__cta" href="#contact" data-i18n="hero.cta_primary"></a>
        <a class="v-a__cta v-a__cta--ghost" href="#work" data-i18n="hero.cta_secondary"></a>
      </div>
      <p class="v-a__proof" data-i18n="hero.proof_line"></p>
    </section>

    <section class="v-a__section" id="problem">
      <p class="v-a__section-label" data-i18n="problem.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="problem.title"></h2>
      <p data-i18n="problem.body"></p>
    </section>

    <section class="v-a__section" id="method">
      <p class="v-a__section-label" data-i18n="method.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="method.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="method.subtitle"></p>

      <ol class="v-a__steps" aria-label="The training methodology">
        <li class="v-a__step">
          <div class="v-a__step-head">
            <span class="v-a__step-label" data-i18n="method.step_1_label"></span>
            <h3 class="v-a__step-title" data-i18n="method.step_1_title"></h3>
            <span class="v-a__step-duration" data-i18n="method.step_1_duration"></span>
          </div>
          <p class="v-a__step-body" data-i18n="method.step_1_body"></p>
        </li>
        <li class="v-a__step">
          <div class="v-a__step-head">
            <span class="v-a__step-label" data-i18n="method.step_2_label"></span>
            <h3 class="v-a__step-title" data-i18n="method.step_2_title"></h3>
            <span class="v-a__step-duration" data-i18n="method.step_2_duration"></span>
          </div>
          <p class="v-a__step-body" data-i18n="method.step_2_body"></p>
        </li>
        <li class="v-a__step">
          <div class="v-a__step-head">
            <span class="v-a__step-label" data-i18n="method.step_3_label"></span>
            <h3 class="v-a__step-title" data-i18n="method.step_3_title"></h3>
            <span class="v-a__step-duration" data-i18n="method.step_3_duration"></span>
          </div>
          <p class="v-a__step-body" data-i18n="method.step_3_body"></p>
        </li>
      </ol>
    </section>

    <section class="v-a__section" id="deliverables">
      <p class="v-a__section-label" data-i18n="deliverables.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="deliverables.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="deliverables.subtitle"></p>
      <ul class="v-a__items">
        <li>
          <h3 class="v-a__item-title" data-i18n="deliverables.item_1_title"></h3>
          <p class="v-a__item-body" data-i18n="deliverables.item_1_body"></p>
        </li>
        <li>
          <h3 class="v-a__item-title" data-i18n="deliverables.item_2_title"></h3>
          <p class="v-a__item-body" data-i18n="deliverables.item_2_body"></p>
        </li>
        <li>
          <h3 class="v-a__item-title" data-i18n="deliverables.item_3_title"></h3>
          <p class="v-a__item-body" data-i18n="deliverables.item_3_body"></p>
        </li>
        <li>
          <h3 class="v-a__item-title" data-i18n="deliverables.item_4_title"></h3>
          <p class="v-a__item-body" data-i18n="deliverables.item_4_body"></p>
        </li>
      </ul>
    </section>

    <section class="v-a__section" id="patterns">
      <p class="v-a__section-label" data-i18n="patterns.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="patterns.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="patterns.subtitle"></p>
      <ul class="v-a__items">
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_1_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_1_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_2_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_2_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_3_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_3_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_4_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_4_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_5_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_5_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_6_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_6_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_7_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_7_body"></p></li>
        <li><h3 class="v-a__item-title" data-i18n="patterns.p_8_title"></h3><p class="v-a__item-body" data-i18n="patterns.p_8_body"></p></li>
      </ul>
    </section>

    <section class="v-a__section" id="work">
      <p class="v-a__section-label" data-i18n="projects.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="projects.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="projects.subtitle"></p>
      <ol class="v-a__projects" id="projects-list" aria-label="Production projects"></ol>
    </section>

    <section class="v-a__section" id="fit">
      <p class="v-a__section-label" data-i18n="who.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="who.title"></h2>
      <div class="v-a__fit">
        <div>
          <h3 data-i18n="who.fit_title"></h3>
          <ul id="fit-list"></ul>
        </div>
        <div>
          <h3 data-i18n="who.notfit_title"></h3>
          <ul id="notfit-list"></ul>
        </div>
      </div>
    </section>

    <section class="v-a__section" id="pricing">
      <p class="v-a__section-label" data-i18n="pricing.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="pricing.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="pricing.subtitle"></p>
      <ul class="v-a__tiers">
        <li class="v-a__tier">
          <div class="v-a__tier-head">
            <div>
              <h3 class="v-a__tier-name" data-i18n="pricing.tier_1_name"></h3>
              <span class="v-a__tier-for" data-i18n="pricing.tier_1_for"></span>
            </div>
            <div style="text-align:right">
              <p class="v-a__tier-price" data-i18n="pricing.tier_1_price"></p>
              <span class="v-a__tier-unit" data-i18n="pricing.tier_1_unit"></span>
            </div>
          </div>
          <p class="v-a__tier-body" data-i18n="pricing.tier_1_body"></p>
          <a class="v-a__tier-cta" href="#contact" data-i18n="pricing.tier_1_cta"></a>
        </li>
        <li class="v-a__tier">
          <div class="v-a__tier-head">
            <div>
              <h3 class="v-a__tier-name" data-i18n="pricing.tier_2_name"></h3>
              <span class="v-a__tier-for" data-i18n="pricing.tier_2_for"></span>
            </div>
            <div style="text-align:right">
              <p class="v-a__tier-price" data-i18n="pricing.tier_2_price"></p>
              <span class="v-a__tier-unit" data-i18n="pricing.tier_2_unit"></span>
            </div>
          </div>
          <p class="v-a__tier-body" data-i18n="pricing.tier_2_body"></p>
          <a class="v-a__tier-cta" href="#contact" data-i18n="pricing.tier_2_cta"></a>
        </li>
        <li class="v-a__tier">
          <div class="v-a__tier-head">
            <div>
              <h3 class="v-a__tier-name" data-i18n="pricing.tier_3_name"></h3>
              <span class="v-a__tier-for" data-i18n="pricing.tier_3_for"></span>
            </div>
            <div style="text-align:right">
              <p class="v-a__tier-price" data-i18n="pricing.tier_3_price"></p>
              <span class="v-a__tier-unit" data-i18n="pricing.tier_3_unit"></span>
            </div>
          </div>
          <p class="v-a__tier-body" data-i18n="pricing.tier_3_body"></p>
          <a class="v-a__tier-cta" href="#contact" data-i18n="pricing.tier_3_cta"></a>
        </li>
      </ul>
    </section>

    <section class="v-a__section" id="faq">
      <p class="v-a__section-label" data-i18n="faq.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="faq.title"></h2>
      <ul class="v-a__faq" id="faq-list"></ul>
    </section>

    <section class="v-a__close" id="contact">
      <p class="v-a__section-label" data-i18n="cta.section_label"></p>
      <h2 class="v-a__section-title" data-i18n="cta.title"></h2>
      <p class="v-a__section-subtitle" data-i18n="cta.subtitle"></p>
      <a class="v-a__cta" id="contact-cta" href="" data-i18n="cta.button"></a>
      <span class="v-a__close-email">
        <span data-i18n="cta.email_label"></span>: <a id="contact-email" href=""></a>
      </span>
    </section>

    <footer class="v-a__footer">
      <span><span data-i18n="footer.author"></span> · <span data-i18n="footer.location"></span></span>
      <a id="footer-site" href=""></a>
      <span data-i18n="footer.rights"></span>
    </footer>

  </main>

  <script src="js/switcher.js"></script>
  <script>
    // Render programmatic lists (projects, fit, faq) from i18n payload.
    document.addEventListener("DOMContentLoaded", () => {
      const projects = window.tList("projects.list");
      const projWrap = document.getElementById("projects-list");
      projWrap.innerHTML = projects.map((p) => `
        <li class="v-a__project" id="proj-${p.slug}">
          <h3 class="v-a__project-name">${p.name}</h3>
          <p class="v-a__project-tagline">${p.tagline}</p>
          <p class="v-a__project-meta"><span>${p.stack}</span><span>${p.ai_role}</span></p>
          <p class="v-a__project-body">${p.body}</p>
        </li>
      `).join("");

      const fitItems    = window.tList("who.fit_items");
      const notFitItems = window.tList("who.notfit_items");
      document.getElementById("fit-list").innerHTML    = fitItems.map(i => `<li>${i}</li>`).join("");
      document.getElementById("notfit-list").innerHTML = notFitItems.map(i => `<li>${i}</li>`).join("");

      const faq = window.tList("faq.items");
      document.getElementById("faq-list").innerHTML = faq.map(({ q, a }) => `
        <details>
          <summary>${q}</summary>
          <p class="v-a__faq-a">${a}</p>
        </details>
      `).join("");

      const email = window.t("cta.email");
      const ctaBtn = document.getElementById("contact-cta");
      ctaBtn.href = "mailto:" + email + "?subject=" + encodeURIComponent("AI-Assisted Engineering — intro call");
      const emailLink = document.getElementById("contact-email");
      emailLink.href = "mailto:" + email;
      emailLink.textContent = email;

      const site = document.getElementById("footer-site");
      site.href = window.t("footer.site_url");
      site.textContent = window.t("footer.site_label");
    });
  </script>
</body>
</html>
